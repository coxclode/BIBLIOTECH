name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (test + build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: biblioteca_user
          POSTGRES_PASSWORD: change_me
          POSTGRES_DB: biblioteca_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U biblioteca_user -d biblioteca_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://biblioteca_user:change_me@localhost:5432/biblioteca_db?schema=public
      JWT_SECRET: ci_test_secret
      JWT_EXPIRES_IN: 8h
      PORT: 4000
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar cliente de Prisma
        run: npx prisma generate

      - name: Aplicar migraciones
        run: npx prisma migrate deploy

      - name: Ejecutar pruebas unitarias con cobertura
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log

      - name: Publicar resumen de cobertura
        if: always()
        shell: bash
        run: |
          {
            echo "## Cobertura de pruebas (backend)"
            echo '```'
            awk '/Coverage summary/,0' test-output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Subir reporte de cobertura como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage
          retention-days: 14

      - name: Compilar backend
        run: npm run build

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_URL: http://localhost:4000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificar tipos y compilar
        run: npm run build
